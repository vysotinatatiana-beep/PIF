<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оценка потенциала</title>
<style>
:root{--bg:#0e1117;--card:#1e2535;--border:#2c3450;--fog:#7280a0;--silver:#a8b4cc;--snow:#dde4f0;--white:#fff;--blue:#4b7cf3;--blue-glow:rgba(75,124,243,.25);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--snow);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{max-width:420px;text-align:center}
.pip{width:8px;height:8px;border-radius:50%;background:var(--blue);box-shadow:0 0 10px var(--blue);margin:0 auto 16px}
h1{font-size:1.6rem;font-weight:800;color:var(--white);margin-bottom:10px}
p{font-size:.88rem;color:var(--silver);line-height:1.6;margin-bottom:28px}
a.btn{display:inline-block;background:var(--blue);color:var(--white);text-decoration:none;padding:14px 36px;border-radius:40px;font-size:.92rem;font-weight:700;box-shadow:0 4px 20px var(--blue-glow)}
.note{margin-top:20px;font-size:.75rem;color:var(--fog)}
</style>
</head>
<body>
<div class="box">
  <div class="pip"></div>
  <h1>Оценка потенциала</h1>
  <p>Точка входа для HR. Кандидаты получают индивидуальные ссылки на тест.</p>
  <a class="btn" href="hr_panel.html">Открыть HR-панель →</a>
  <div class="note">Если вы кандидат и попали сюда по ошибке — обратитесь к специалисту, который прислал ссылку на тест.</div>
</div>
</body>
</html>
